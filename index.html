/* ---------------- crypto helpers ---------------- */
async function hashText(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

/* ---------------- storage shim (localStorage-backed replacement for window.storage) ---------------- */
window.storage = {
  async get(key, shared){
    if(!Object.prototype.hasOwnProperty.call(localStorage, key)){
      throw new Error("key not found: "+key);
    }
    return { key, value: localStorage.getItem(key), shared: !!shared };
  },
  async set(key, value, shared){
    localStorage.setItem(key, value);
    return { key, value, shared: !!shared };
  },
  async delete(key, shared){
    const existed = Object.prototype.hasOwnProperty.call(localStorage, key);
    localStorage.removeItem(key);
    return { key, deleted: existed, shared: !!shared };
  },
  async list(prefix, shared){
    const keys = [];
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(!prefix || k.indexOf(prefix)===0) keys.push(k);
    }
    return { keys, prefix, shared: !!shared };
  }
};

      .eq("active", true);
    if(error) throw error;
    return (data||[]).map(r=>r.lesson_id);
  }catch(e){ console.error("getGrants failed:", e); return []; }
}
/* setGrants: بدل الحذف الكامل وإعادة الإدخال (اللي بيمسح كل التاريخ ويعتمد على نجاح
   خطوتين منفصلتين)، بنعتمد على عمود active كمصدر وحيد للحقيقة:
   1) نطفي (active=false) كل اشتراكات الطالب.
   2) نعمل upsert للحصص المطلوبة فقط بـ active=true (يتطلب unique constraint على
      student_email+lesson_id — موجود في SQL المرفق تحت). */
async function setGrants(studentEmail, lessonIds){
  const desired = Array.from(new Set(lessonIds));
  try{
    const {error:offErr} = await sb
      .from("subscriptions")
      .update({active:false})
      .eq("student_email", studentEmail);
    if(offErr) throw offErr;

    if(desired.length>0){
      const rows = desired.map(lesson_id=>({student_email:studentEmail, lesson_id, active:true}));
      const {error:upErr} = await sb
        .from("subscriptions")
        .upsert(rows, {onConflict:"student_email,lesson_id"});
      if(upErr) throw upErr;
    }
    return {ok:true};
  }catch(e){
    console.error("setGrants failed:", e);
    return {ok:false, error:e};
  }
}

function esc(s){ return (s||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function setToast(t){ toast = t; render(); setTimeout(()=>{ if(toast===t){toast=null; render();} },3500); }
function findSubject(id){ return content[id]; }
function findGrade(subjId,gradeId){ return content[subjId].grades.find(g=>g.id===gradeId); }
function embedUrl(link){
  if(!link) return "";
  try{
    const u = new URL(link);
    if(u.hostname.includes("youtube.com") || u.hostname.includes("youtu.be")){
      let id = u.searchParams.get("v");
      if(!id && u.hostname.includes("youtu.be")) id = u.pathname.slice(1);
      if(u.pathname.includes("/embed/")) return link+(link.includes("?")?"&":"?")+"enablejsapi=1";
      if(id) return "https://www.youtube.com/embed/"+id+"?enablejsapi=1";
    }
    if(u.hostname.includes("drive.google.com")){
      const m = link.match(/\/d\/([^/]+)/);
      if(m) return "https://drive.google.com/file/d/"+m[1]+"/preview";
    }
  }catch(e){}
  return link;
}

function gradeQuiz(globalId, quiz){
  let score = 0;
  quiz.forEach((q,qi)=>{
    const checked = document.querySelector(`input[name="quizq_${CSS.escape(globalId)}_${qi}"]:checked`);
    if(checked && Number(checked.value)===Number(q.correct)) score++;
  });
  return {score, total: quiz.length};
}

/* interactive sound feedback (Web Audio, no external files) */
function playResultSound(good){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const notes = good? [523.25,659.25,783.99,1046.5] : [400,320,240];
    let t = ctx.currentTime;
    notes.forEach((freq,i)=>{
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = good? "triangle":"sawtooth";
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0.001, t);
      gain.gain.linearRampToValueAtTime(0.18, t+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t+0.28);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t+0.3);
      t += good? 0.16 : 0.22;
    });
  }catch(e){}
}

          <button class="${authTab==='login'?'active':''}" data-action="auth-tab" data-tab="login">تسجيل الدخول</button>
          <button class="${authTab==='register'?'active':''}" data-action="auth-tab" data-tab="register">حساب جديد</button>
        </div>
        <div class="field"><label>البريد الإلكتروني (Gmail)</label><input type="email" id="authEmail" placeholder="name@gmail.com"></div>
        <div class="field"><label>كلمة المرور</label><input type="password" id="authPass"></div>
        <button class="btn gold" style="width:100%" data-action="${authTab==='login'?'do-login':'do-register'}">${authTab==='login'?'دخول':'إنشاء الحساب'}</button>
        <p style="font-size:.78rem;color:#8a97a1;margin-top:12px;">استخدم نفس الإيميل الذي سترسله عند الدفع، حتى يتم تفعيل اشتراكك عليه.</p>
      </div>
    </div>`;
  }
  if(modal==="pay"){
    return `<div class="overlay" data-action="close-modal-bg">
      <div class="modal wide" onclick="event.stopPropagation()">
        <button class="modal-close" data-action="close-modal">✕</button>
        <div style="clear:both"></div>
        <h3>طريقة الاشتراك في المنصة</h3>
        <p style="color:#5a6b76;font-size:.92rem;">الحصة الواحدة <b>${PRICE_LESSON} جنيه</b> — الاشتراك الشهري <b>${PRICE_MONTH} جنيه (${MONTH_LESSONS} حصص)</b>.</p>
        <div class="pay-box"><div class="lbl">فودافون كاش</div><div class="val">${VODAFONE_CASH}</div></div>
        <div class="pay-box"><div class="lbl">إنستاباي</div><div class="val" style="font-size:.8rem"><a href="${INSTAPAY_LINK}" target="_blank">${INSTAPAY_LINK}</a></div></div>
        <div class="pay-box">
          <div class="lbl">بعد التحويل</div>
          <div style="font-size:.9rem;margin-top:6px;">أرسل صورة إيصال التحويل + إيميل حسابك على واتساب:</div>
          <div class="val" style="margin-top:6px;">01107558827</div>
          <a class="btn gold sm" style="margin-top:10px;display:inline-block" target="_blank" href="https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent('مرحباً، أرسل لكم إيصال الدفع لتفعيل الاشتراك. الإيميل: ')}">فتح واتساب مباشرة</a>
        </div>
        <p style="font-size:.78rem;color:#8a97a1;">بعد المراجعة يتم فتح الحصص المطلوبة على إيميلك خلال وقت قصير.</p>
      </div>
    </div>`;
  }
  return "";
}

/* ---------------- event binding ---------------- */
function bindEvents(){
  document.querySelectorAll("[data-nav]").forEach(el=>{
    el.addEventListener("click", ()=>{
      route = JSON.parse(el.getAttribute("data-nav"));
      if(route.name==="admin"){ adminUnlocked = adminUnlocked; }
      render();
    });
  });
  const act = (sel,fn)=>document.querySelectorAll(sel).forEach(el=>el.addEventListener("click",fn));

  act('[data-action="open-auth"]', ()=>{ modal="auth"; authTab="login"; render(); });
  act('[data-action="open-pay"]', ()=>{
    if(!currentUser){ modal="auth"; authTab="login"; setToast({type:"err",text:"سجّل الدخول أولاً حتى يتم ربط الاشتراك بإيميلك."}); return; }
    modal="pay"; render();
  });
  act('[data-action="close-modal"]', ()=>{ modal=null; render(); });
  act('[data-action="close-modal-bg"]', (e)=>{ if(e.target.classList.contains("overlay")){ modal=null; render(); } });

  act('[data-action="submit-quiz"]', function(){
    const globalId = this.dataset.gid2;
    const parts = globalId.split("__");
    const g = findGrade(parts[0], parts[1]);
    const l = g && g.lessons.find(x=>x.id===parts[2]);
    if(!l) return;
    const result = gradeQuiz(globalId, l.quiz||[]);
    quizResults[globalId] = result;
    render();
    const good = (result.score/result.total) >= 0.6;
    playResultSound(good);
  });
  act('[data-action="retake-quiz"]', function(){
    const globalId = this.dataset.gid2;
    delete quizResults[globalId];
    render();
  });
  act('[data-action="auth-tab"]', function(){ authTab=this.getAttribute("data-tab"); render(); });
  act('[data-action="logout"]', async ()=>{
    await sb.auth.signOut();
    currentUser=null; grants=[]; route={name:"home"}; render();
  });

  act('[data-action="do-login"]', async ()=>{
    const email = document.getElementById("authEmail").value.trim().toLowerCase();
    const pass = document.getElementById("authPass").value;
    if(!email||!pass){ setToast({type:"err",text:"من فضلك أدخل الإيميل وكلمة المرور."}); return; }
    const {data, error} = await sb.auth.signInWithPassword({email, password:pass});
    if(error){ setToast({type:"err",text:supabaseErrorToArabic(error)}); return; }
    currentUser = {id:data.user.id, email:data.user.email};
    await ensureStudentRow(currentUser.id, currentUser.email);
    grants = await getGrants(currentUser.email);
    modal=null;
    setToast({type:"ok",text:"تم تسجيل الدخول بنجاح."});
  });

  act('[data-action="do-register"]', async ()=>{
    const email = document.getElementById("authEmail").value.trim().toLowerCase();
    const pass = document.getElementById("authPass").value;
    if(!email.includes("@")||pass.length<6){ setToast({type:"err",text:"أدخل إيميل صحيح وكلمة مرور 6 أحرف على الأقل."}); return; }
    const {data, error} = await sb.auth.signUp({email, password:pass});
    if(error){ setToast({type:"err",text:supabaseErrorToArabic(error)}); return; }
    if(!data.session){
      /* email confirmation required by the Supabase project settings */
      modal=null;
      setToast({type:"ok",text:"تم إنشاء الحساب، برجاء تفعيل الإيميل من الرسالة المرسلة إليك ثم تسجيل الدخول."});
      return;
    }
    currentUser = {id:data.user.id, email:data.user.email};
    await ensureStudentRow(currentUser.id, currentUser.email);
    grants = [];
    modal=null;
    setToast({type:"ok",text:"تم إنشاء الحساب بنجاح."});
  });

  /* admin */
  act('[data-action="set-admin-pass"]', async ()=>{
    const p = document.getElementById("newAdminPass").value;
    if(p.length<4){ setToast({type:"err",text:"كلمة مرور قصيرة جداً."}); return; }
    await setAdminPass(await hashText(p));
    adminHasPassword=true; adminUnlocked=true;
    setToast({type:"ok",text:"تم تعيين كلمة مرور الإدارة."});
  });
  act('[data-action="admin-login"]', async ()=>{
    const p = document.getElementById("adminPassInput").value;
    if(p===ADMIN_FIXED_PASSWORD){ adminUnlocked=true; setToast({type:"ok",text:"مرحباً بك في لوحة التحكم."}); }
    else setToast({type:"err",text:"كلمة مرور خاطئة."});
  });
  act('[data-action="admin-logout"]', ()=>{ adminUnlocked=false; render(); });
  act('[data-action="admin-tab"]', function(){ adminTab=this.getAttribute("data-tab"); render(); });

  act('[data-action="add-lesson"]', function(){
    const sid=this.dataset.sid, gid=this.dataset.gid;
    const g = findGrade(sid,gid);
    const newId = "l"+(g.lessons.length+1)+"_"+Date.now().toString(36).slice(-4);
    g.lessons.push({id:newId, title:"حصة جديدة", link:"", quiz:[]});
    render();
  });
  act('[data-action="del-lesson"]', function(){
    const sid=this.dataset.sid, gid=this.dataset.gid, lid=this.dataset.lid;
    const g = findGrade(sid,gid);
    g.lessons = g.lessons.filter(l=>l.id!==lid);
    render();
  });
  document.querySelectorAll('[data-edit]').forEach(inp=>{
    inp.addEventListener("input", function(){
      const sid=this.dataset.sid, gid=this.dataset.gid, lid=this.dataset.lid, field=this.dataset.edit;
      const g = findGrade(sid,gid); const l = g.lessons.find(x=>x.id===lid);
      l[field]=this.value;
    });
  });
  act('[data-action="save-content"]', async ()=>{ await saveContent(); setToast({type:"ok",text:"تم حفظ كل التعديلات على المنصة."}); });

  /* quiz admin editor */
  act('[data-action="toggle-quiz-editor"]', function(){
    const gid2 = this.dataset.gid2;
    quizEditorOpen[gid2] = !quizEditorOpen[gid2];
    render();
  });
  act('[data-action="add-quiz-q"]', function(){
    const sid=this.dataset.sid, gid=this.dataset.gid, lid=this.dataset.lid;
    const g = findGrade(sid,gid); const l = g.lessons.find(x=>x.id===lid);
    if(!l.quiz) l.quiz = [];
    l.quiz.push({q:"", o:["","","",""], correct:0});
    render();
  });
  act('[data-action="del-quiz-q"]', function(){
    const sid=this.dataset.sid, gid=this.dataset.gid, lid=this.dataset.lid, idx=Number(this.dataset.idx);
    const g = findGrade(sid,gid); const l = g.lessons.find(x=>x.id===lid);
    l.quiz.splice(idx,1);
    render();
  });
  document.querySelectorAll('[data-qedit]').forEach(inp=>{
    inp.addEventListener("input", function(){
      const sid=this.dataset.sid, gid=this.dataset.gid, lid=this.dataset.lid, idx=Number(this.dataset.idx), field=this.dataset.qedit;
      const g = findGrade(sid,gid); const l = g.lessons.find(x=>x.id===lid);
      const q = l.quiz[idx];
      if(field==="q") q.q = this.value;
      else if(field==="correct") q.correct = Number(this.value);
      else if(field[0]==="o") q.o[Number(field[1])] = this.value;
    });
    if(inp.tagName==="SELECT"){
      inp.addEventListener("change", function(){
        const sid=this.dataset.sid, gid=this.dataset.gid, lid=this.dataset.lid, idx=Number(this.dataset.idx);
        const g = findGrade(sid,gid); const l = g.lessons.find(x=>x.id===lid);
        l.quiz[idx].correct = Number(this.value);
      });
    }
  });

  act('[data-action="load-grant-email"]', async ()=>{
    const email = document.getElementById("grantEmail").value.trim().toLowerCase();
    if(!email){ return; }
    const area = document.getElementById("grantArea");
    area.innerHTML = `<div class="msg ok">جاري البحث...</div>`;
    const u = await getUser(email);
    if(!u){ area.innerHTML = `<div class="msg err">لا يوجد حساب بهذا الإيميل بعد. اطلب من الطالب إنشاء حساب أولاً.</div>`; return; }
    const currentGrants = await getGrants(u.email);
    window.__grantDraft = new Set(currentGrants);
    area.innerHTML = renderGrantEditor(u, currentGrants);
    bindGrantEditor(u.email);
  });

  act('[data-action="admin-tab"]', function(){});
}

function renderGrantEditor(student, currentGrants){
  const email = student.email;
  let html = `<div class="msg ok">حساب موجود: ${esc(email)} — الحصص المفتوحة حالياً: ${currentGrants.length}</div>`;
  html += `<div class="warn-box" style="margin:10px 0;">حدد الحصص المطلوب فتحها (بحد أقصى ${MONTH_LESSONS} حصة للاشتراك الشهري).</div>`;
  ["math","acc"].forEach(sid=>{
    const s = content[sid];
    html += `<h4 style="color:var(--gold);margin-top:14px;">${s.icon} ${esc(s.name)}</h4>`;
    s.grades.forEach(g=>{
      if(g.lessons.length===0) return;
      html += `<div style="margin-bottom:8px;"><b style="font-size:.85rem">${esc(g.name)}</b><div class="chk-grid">`;
      g.lessons.forEach(l=>{
        const gid = subjLessonId(sid,g.id,l.id);
        const checked = currentGrants.includes(gid);
        html += `<label class="chk-item"><input type="checkbox" data-grantid="${gid}" ${checked?'checked':''}> ${esc(l.title)}</label>`;
      });
      html += `</div></div>`;
    });
  });
  html += `<div id="grantCountWarn" class="msg err" style="display:none;">لا يمكن اختيار أكثر من ${MONTH_LESSONS} حصص ضمن الاشتراك الشهري.</div>`;
  html += `<button class="btn gold" data-action="save-grants" data-studentemail="${esc(student.email)}">💾 حفظ الاشتراك لهذا الطالب</button>`;
  return html;
}

function bindGrantEditor(email){
  document.querySelectorAll('[data-grantid]').forEach(cb=>{
    cb.addEventListener("change", function(){
      const id = this.dataset.grantid;
      if(this.checked) window.__grantDraft.add(id); else window.__grantDraft.delete(id);
      const warn = document.getElementById("grantCountWarn");
      warn.style.display = window.__grantDraft.size > MONTH_LESSONS ? "block" : "none";
    });
  });
  document.querySelector('[data-action="save-grants"]').addEventListener("click", async function(){
    const btn = this;
    const list = Array.from(window.__grantDraft);
    btn.disabled = true; btn.textContent = "جاري الحفظ...";
    const result = await setGrants(email, list);
    btn.disabled = false; btn.textContent = "💾 حفظ الاشتراك لهذا الطالب";
    if(result.ok){
      setToast({type:"ok",text:"تم تحديث اشتراك الطالب "+email+" — عدد الحصص المفتوحة: "+list.length});
    }else{
      setToast({type:"err",text:"تعذّر حفظ الاشتراك، تأكد من صلاحيات Supabase (RLS) على جدول subscriptions."});
    }
  });
}

/* ---------------- best-effort recording deterrents ---------------- */
/* ملاحظة: لا توجد وسيلة برمجية داخل المتصفح تكتشف تسجيل الشاشة بشكل مضمون 100%،
   خصوصاً لو حد صوّر الشاشة بموبايل تاني من بره. اللي تحت ده إجراءات رادعة قدر الإمكان فقط. */
function toggleRecOverlay(show){
  const ov = document.getElementById("recOverlay");
  if(!ov) return;
  ov.style.display = show ? "flex" : "none";
}
function pauseVideoFrame(){
  const f = document.getElementById("playerFrame");
  if(f && f.src && f.src.includes("youtube.com")){
    try{ f.contentWindow.postMessage(JSON.stringify({event:"command",func:"pauseVideo",args:[]}), "*"); }catch(e){}
  }
}
function flashRecOverlay(){
  toggleRecOverlay(true);
  setTimeout(()=>{ if(!document.hidden) toggleRecOverlay(false); }, 1500);
}
document.addEventListener("visibilitychange", ()=>{
  if(document.hidden){ toggleRecOverlay(true); pauseVideoFrame(); }
  else{ toggleRecOverlay(false); }
});
window.addEventListener("blur", ()=>{ toggleRecOverlay(true); pauseVideoFrame(); });
window.addEventListener("focus", ()=>{ toggleRecOverlay(false); });
window.addEventListener("keyup", (e)=>{ if(e.key==="PrintScreen"){ flashRecOverlay(); } });
window.addEventListener("keydown", (e)=>{
  if((e.metaKey||e.ctrlKey) && e.shiftKey && ["s","S","4","3"].includes(e.key)){ flashRecOverlay(); }
});

/* ---------------- init ---------------- */
async function init(){
  await loadContent();
  adminHasPassword = true; // كلمة المرور ثابتة (1792006) ولا تحتاج تعيين لأول مرة

  const {data:{session}} = await sb.auth.getSession();
  if(session && session.user){
    currentUser = {id:session.user.id, email:session.user.email};
    await ensureStudentRow(currentUser.id, currentUser.email);
    grants = await getGrants(currentUser.email);
  }

  sb.auth.onAuthStateChange((event, session)=>{
    if(event==="SIGNED_OUT"){
      currentUser = null; grants = [];
      render();
    }
  });

  render();
}
init();

   واجهة تصحيح فقط (Debug) — عشان تقدر تختبر الدوال من console
   المتصفح مباشرة. الدوال الأصلية فضلت جوه الـ IIFE زي ما هي
   (encapsulation سليم)؛ دي مجرد مرايا بتشاور عليها من الخارج.
   مثال استخدام من الـ console:
     await window.VirexonDebug.getGrants("student@example.com")
     await window.VirexonDebug.setGrants("student@example.com", ["math__g4__l1"])
     window.VirexonDebug.getCurrentUser()
   ------------------------------------------------------------ */
window.VirexonDebug = {
  getGrants,
  setGrants,
  getUser,
  ensureStudentRow,
  getCurrentUser: ()=>currentUser,
  getCurrentGrants: ()=>grants,
  sb
};

})();
