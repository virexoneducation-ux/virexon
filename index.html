<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virexon | فيركسون</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  // Map the platform's existing brand tokens into Tailwind so new markup can use
  // utility classes (bg-navy, text-gold, etc.) without duplicating the palette.
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          navy: '#123A59',
          'navy-2': '#1C4E77',
          ink: '#0A2338',
          gold: '#D4A23A',
          'gold-light': '#E8C272',
          paper: '#F5F3EE',
          'paper-2': '#EAE5D8',
          danger: '#B0413E',
          ok: '#2E7D5B'
        },
        fontFamily: {
          cairo: ['Cairo', 'sans-serif'],
          tajawal: ['Tajawal', 'sans-serif']
        }
      }
    }
  };
</script>
<style>
  :root{
    --ink:#0A2338;
    --navy:#123A59;
    --navy-2:#1C4E77;
    --navy-deep:#0B2740;
    --gold:#D4A23A;
    --gold-light:#E8C272;
    --gold-dark:#B27F22;
    --paper:#F5F3EE;
    --paper-2:#EAE5D8;
    --white:#ffffff;
    --danger:#B0413E;
    --ok:#2E7D5B;
    --text-muted:#5C6B78;
    --line: rgba(18,58,89,0.12);
    --shadow-sm: 0 2px 8px rgba(11,39,64,.08);
    --shadow: 0 10px 28px rgba(11,39,64,.12);
    --shadow-lg: 0 22px 50px rgba(11,39,64,.20);
    --radius: 16px;
    --radius-sm: 10px;
  }
  html{scroll-behavior:smooth;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Tajawal',sans-serif;line-height:1.7;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,h4{font-family:'Cairo',sans-serif;margin:0 0 .4em;letter-spacing:-.01em;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;border:none;}
  ::selection{background:var(--gold-light);}
  .eyebrow-label{display:inline-flex;align-items:center;gap:6px;color:var(--gold-dark);font-weight:800;letter-spacing:.4px;font-size:.78rem;font-family:'Cairo',sans-serif;background:rgba(212,162,58,.12);padding:6px 14px;border-radius:999px;border:1px solid rgba(212,162,58,.3);}

  /* ===== icon safety net =====
     كل الأيقونات بتتولد من دالة ico() وبتاخد كلاس "ic" بحجم افتراضي آمن، بالإضافة لسقف
     صارم على أي عنصر svg في الصفحة عشان محدش يظهر بحجم عملاق حتى لو حصل خطأ في CSS سياقي. */
  svg.ic{width:20px;height:20px;flex-shrink:0;display:inline-block;vertical-align:-4px;}
  svg{max-width:48px;max-height:48px;}
  .inline-ico{display:inline-flex;vertical-align:-3px;}
  .inline-ico svg{width:14px;height:14px;}

  /* ===== Header ===== */
  header.top{
    position:sticky;top:0;z-index:50;
    background:linear-gradient(180deg,var(--navy) 0%, var(--navy-deep) 100%);
    color:var(--white);
    box-shadow:var(--shadow);
    border-bottom:2px solid rgba(212,162,58,.35);
  }
  .top-inner{max-width:1180px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 24px;}
  .brand{display:flex;align-items:center;gap:8px;font-family:'Cairo',sans-serif;font-weight:900;font-size:1.5rem;letter-spacing:.5px;}
  .brand .mark{
    width:38px;height:38px;border-radius:10px;flex-shrink:0;
    background:conic-gradient(from 220deg, var(--gold), var(--gold-light), var(--gold));
    display:flex;align-items:center;justify-content:center;color:var(--navy);font-weight:900;font-family:'Cairo';
    transition:width .2s,height .2s;
  }
  .brand .en{font-size:.6rem;letter-spacing:3px;opacity:.7;font-family:'Tajawal';display:block;font-weight:400;}
  nav.links{display:flex;gap:4px;align-items:center;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;}
  nav.links::-webkit-scrollbar{display:none;}
  nav.links button{
    background:transparent;color:var(--white);padding:8px 14px;border-radius:999px;font-weight:600;font-size:.92rem;
    transition:.2s;white-space:nowrap;flex-shrink:0;
  }
  nav.links button:hover{background:rgba(255,255,255,.12);}
  nav.links button.active{background:var(--gold);color:var(--navy);}
  .user-chip{background:rgba(255,255,255,.1);padding:6px 12px;border-radius:999px;font-size:.8rem;display:flex;gap:6px;align-items:center;max-width:180px;}
  .user-chip svg{width:14px;height:14px;flex-shrink:0;}
  .user-chip span.chip-email{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:120px;}
  .user-chip button{background:transparent;color:var(--gold-light);font-weight:700;padding:0;flex-shrink:0;}

  main{max-width:1180px;margin:0 auto;padding:16px 24px 48px;min-height:60vh;}
  main > section,
  main > .search-box{margin-bottom:24px;}
  main > section:last-child,
  main > .search-box:last-child{margin-bottom:0;}

  /* ===== Compact mobile header (30-40% shorter) ===== */
  @media(max-width:640px){
    .top-inner{padding:8px 14px;gap:6px;}
    .brand{font-size:1.05rem;gap:6px;}
    .brand .mark{width:28px;height:28px;border-radius:8px;font-size:.85rem;}
    .brand .en{font-size:.5rem;letter-spacing:2px;}
    nav.links button{padding:6px 10px;font-size:.8rem;}
    .user-chip{padding:5px 9px;font-size:.72rem;max-width:120px;}
    .user-chip span.chip-email{max-width:64px;}
    main{padding:10px 14px 44px;}
    main > section,
    main > .search-box{margin-bottom:16px;}
  }

  /* ===== Hero ===== */
  .hero{
    background:linear-gradient(155deg,var(--navy) 0%, var(--navy-deep) 62%, var(--navy-deep) 100%);
    background-image:radial-gradient(circle at 88% -10%, rgba(212,162,58,.30), transparent 45%),
                      linear-gradient(155deg,var(--navy) 0%, var(--navy-deep) 62%, var(--navy-deep) 100%);
    border-radius:24px;padding:38px 40px;box-shadow:var(--shadow-lg);color:var(--white);
    display:grid;grid-template-columns:1.35fr 1fr;gap:28px;align-items:center;position:relative;overflow:hidden;
  }
  .hero::after{content:"";position:absolute;inset:0;border:1px solid rgba(255,255,255,.08);border-radius:24px;pointer-events:none;}
  .hero .eyebrow{color:var(--gold-light);font-weight:800;letter-spacing:.5px;font-size:.82rem;margin-bottom:12px;display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);padding:6px 14px;border-radius:999px;}
  .hero .eyebrow svg{width:14px;height:14px;}
  .hero h1{font-size:2.5rem;color:#fff;line-height:1.32;max-width:600px;font-weight:900;}
  .hero p{color:rgba(255,255,255,.82);font-size:1.05rem;max-width:540px;margin-top:12px;line-height:1.85;}
  .hero-actions{margin-top:26px;display:flex;gap:12px;flex-wrap:wrap;}
  .hero-trust{margin-top:26px;display:flex;gap:22px;flex-wrap:wrap;color:rgba(255,255,255,.68);font-size:.82rem;}
  .hero-trust span{display:flex;align-items:center;gap:6px;}
  .hero-trust svg{width:15px;height:15px;color:var(--gold-light);}
  @media(max-width:900px){
    .hero{grid-template-columns:1fr;padding:28px 22px;border-radius:20px;}
  }
  @media(max-width:640px){
    .hero h1{font-size:1.6rem;}
    .hero p{font-size:.92rem;}
  }
  .hero-panel{
    background:rgba(255,255,255,.06);color:var(--white);border-radius:18px;padding:24px;
    border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(6px);
  }
  .hero-panel .hp-title{font-family:'Cairo';font-weight:800;font-size:.9rem;color:var(--gold-light);margin-bottom:14px;}
  .hero-panel .row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.12);font-size:.92rem;}
  .hero-panel .row:last-child{border-bottom:none;}
  .hero-panel .row .stat-label{color:rgba(255,255,255,.75);display:flex;align-items:center;gap:8px;}
  .hero-panel .row .stat-label svg{width:16px;height:16px;color:var(--gold-light);}
  .hero-panel .price{color:var(--gold-light);font-weight:800;font-family:'Cairo';font-size:1.05rem;}

  /* ===== features strip ===== */
  .features-strip{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  @media(max-width:760px){.features-strip{grid-template-columns:1fr;}}
  .feature-card{background:var(--white);border-radius:16px;padding:20px;box-shadow:var(--shadow-sm);border:1px solid var(--line);display:flex;gap:14px;align-items:flex-start;transition:box-shadow .2s,transform .2s;}
  .feature-card:hover{box-shadow:var(--shadow);transform:translateY(-2px);}
  .feature-icon{width:44px;height:44px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,var(--navy),var(--navy-2));color:var(--gold-light);display:flex;align-items:center;justify-content:center;}
  .feature-card h4{color:var(--navy);font-size:.98rem;margin-bottom:3px;}
  .feature-card p{color:var(--text-muted);font-size:.85rem;margin:0;line-height:1.7;}

  /* ===== section headers ===== */
  .section-title{color:var(--navy);font-size:1.5rem;font-weight:900;margin-bottom:4px;}
  .section-sub{color:var(--text-muted);font-size:.92rem;margin-bottom:18px;}

  /* ===== subject page banner ===== */
  .subject-banner{
    background:linear-gradient(150deg,var(--navy) 0%, var(--navy-deep) 100%);color:var(--white);border-radius:22px;padding:32px;box-shadow:var(--shadow-lg);
    background-image:radial-gradient(circle at 92% 0%, rgba(212,162,58,.30), transparent 50%),
                      linear-gradient(150deg,var(--navy) 0%, var(--navy-deep) 100%);
    display:flex;align-items:center;gap:22px;flex-wrap:wrap;position:relative;overflow:hidden;
  }
  .subject-banner::after{content:"";position:absolute;inset:0;border:1px solid rgba(255,255,255,.08);border-radius:22px;pointer-events:none;}
  .subject-banner-icon{
    width:72px;height:72px;border-radius:18px;flex-shrink:0;font-size:2.2rem;
    background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.14);display:flex;align-items:center;justify-content:center;
  }
  .subject-banner-body{flex:1;min-width:220px;}
  .subject-banner-body h1{color:#fff;font-size:1.9rem;margin-bottom:6px;font-weight:900;}
  .subject-banner-tagline{color:rgba(255,255,255,.82);font-size:.98rem;margin:0 0 10px;max-width:560px;line-height:1.85;}
  .subject-banner-stats{display:flex;flex-wrap:wrap;gap:10px;}
  .subject-banner-count{display:flex;align-items:center;gap:6px;color:#fff;font-size:.82rem;font-weight:700;margin:0;background:rgba(255,255,255,.1);padding:6px 12px;border-radius:999px;}
  .subject-banner-count svg{width:14px;height:14px;color:var(--gold-light);}
  .subject-banner-cta{flex-shrink:0;}
  @media(max-width:640px){
    .subject-banner{padding:20px;flex-direction:column;align-items:flex-start;text-align:right;}
    .subject-banner-cta{width:100%;justify-content:center;}
  }

  /* ===== Subject cards (redesigned) ===== */
  .subjects-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:2px;}
  @media(max-width:760px){.subjects-grid{grid-template-columns:1fr;gap:14px;}}
  .subj-card{
    background:var(--white);border-radius:20px;padding:22px;box-shadow:var(--shadow);
    border:1px solid var(--line);border-top:4px solid var(--gold);cursor:pointer;transition:transform .22s ease,box-shadow .22s ease;position:relative;overflow:hidden;
  }
  .subj-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-lg);}
  .subj-card:hover .subj-icon{transform:scale(1.08) rotate(-3deg);}
  .subj-card:active{transform:translateY(-2px);}
  .subj-card-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px;}
  .subj-icon{
    width:56px;height:56px;border-radius:14px;flex-shrink:0;font-size:1.7rem;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);color:var(--gold-light);
    box-shadow:0 6px 16px rgba(18,58,89,.25);
    transition:transform .25s ease;
  }
  .subj-pill{
    display:inline-flex;align-items:center;gap:5px;font-size:.72rem;font-weight:800;font-family:'Cairo';
    padding:6px 12px;border-radius:999px;background:var(--paper-2);color:var(--navy-2);white-space:nowrap;
  }
  .subj-pill.done{background:#e2efe7;color:var(--ok);}
  .subj-pill svg{width:12px;height:12px;}
  .subj-card h3{color:var(--navy);font-size:1.3rem;margin:2px 0 4px;}
  .subj-card .subj-desc{color:var(--text-muted);font-size:.86rem;line-height:1.7;margin:0 0 10px;}
  .subj-card .teacher{color:var(--gold-dark);font-weight:700;font-size:.85rem;display:flex;align-items:center;gap:5px;margin-top:2px;}
  .subj-card .teacher svg{width:13px;height:13px;flex-shrink:0;}
  .subj-meta-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
  .subj-meta{display:flex;align-items:center;gap:6px;color:var(--navy-2);font-size:.78rem;font-weight:700;background:var(--paper);border:1px solid var(--line);padding:5px 10px;border-radius:999px;}
  .subj-meta svg{width:13px;height:13px;color:var(--navy-2);flex-shrink:0;}
  .subj-card .subj-progress{margin-top:12px;}
  .subj-cta{width:100%;margin-top:16px;}
  .subj-cta svg{width:14px;height:14px;transition:transform .2s;}
  .subj-card:hover .subj-cta svg{transform:translateX(-3px);}

  /* ===== breadcrumb / section header ===== */
  .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:10px;}
  .breadcrumb{color:#5a6b76;font-size:.9rem;}
  .breadcrumb button{color:var(--navy-2);font-weight:700;}

  /* ===== grade / class cards (redesigned) ===== */
  .grade-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px;}
  @media(max-width:480px){.grade-grid{grid-template-columns:1fr;}}
  .grade-card{
    background:var(--white);border-radius:16px;padding:18px;box-shadow:var(--shadow-sm);
    border:1px solid var(--line);border-top:3px solid transparent;transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;
    display:flex;flex-direction:column;gap:9px;
  }
  .grade-card:hover{border-color:var(--line);border-top-color:var(--gold);transform:translateY(-4px);box-shadow:var(--shadow);}
  .grade-card-top{display:flex;align-items:center;gap:10px;}
  .grade-icon{
    width:42px;height:42px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,var(--paper-2),var(--paper));color:var(--navy);
    display:flex;align-items:center;justify-content:center;border:1px solid var(--line);
  }
  .grade-icon svg{width:19px;height:19px;}
  .grade-card h4{color:var(--navy);margin:0;font-size:1rem;line-height:1.35;font-weight:800;}
  .grade-card .count{color:var(--text-muted);font-size:.8rem;display:flex;align-items:center;gap:4px;font-weight:600;}
  .grade-card .count svg{width:12px;height:12px;}
  .grade-card .grade-stats-row{display:flex;align-items:center;justify-content:space-between;font-size:.76rem;color:var(--text-muted);}
  .grade-card .grade-percent{font-weight:800;color:var(--gold-dark);font-family:'Cairo';}
  .grade-card .last-watch{display:flex;align-items:center;gap:4px;color:#9aa5ac;font-size:.74rem;}
  .grade-card .last-watch svg{width:11px;height:11px;}
  .grade-card .btn{width:100%;margin-top:2px;}

  /* ===== circular progress ring (pure CSS, no libraries) ===== */
  .ring{
    --p:0;border-radius:50%;position:relative;flex-shrink:0;
    background:conic-gradient(var(--gold) calc(var(--p)*1%), var(--paper-2) 0);
    display:flex;align-items:center;justify-content:center;
    transition:background 1s cubic-bezier(.22,1,.36,1);
  }
  .ring::before{content:"";position:absolute;inset:14%;border-radius:50%;background:var(--white);}
  .ring-val{position:relative;z-index:1;font-family:'Cairo';font-weight:800;color:var(--navy);}

  /* ===== buttons: icons, hover lift, press animation, softer shadow ===== */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:7px;
    padding:12px 20px;border-radius:11px;background:var(--navy);color:var(--white);
    font-weight:700;font-size:.9rem;transition:transform .15s ease,box-shadow .15s ease,background .2s ease;
    box-shadow:0 4px 10px rgba(11,39,64,.18);min-height:44px;
  }
  .btn svg{width:16px;height:16px;flex-shrink:0;}
  .btn:hover{background:var(--navy-2);transform:translateY(-2px);box-shadow:0 10px 20px rgba(11,39,64,.26);}
  .btn:active{transform:translateY(0) scale(.96);box-shadow:0 2px 6px rgba(11,39,64,.2);}
  .btn:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
  .btn.gold{background:var(--gold);color:var(--navy);box-shadow:0 4px 12px rgba(212,162,58,.4);}
  .btn.gold:hover{background:var(--gold-light);box-shadow:0 10px 22px rgba(212,162,58,.45);}
  .btn.outline{background:transparent;border:1.5px solid var(--navy);color:var(--navy);box-shadow:none;}
  .btn.outline:hover{background:rgba(18,58,89,.06);}
  .btn.outline-light{background:transparent;border:1.5px solid rgba(255,255,255,.5);color:var(--white);box-shadow:none;}
  .btn.outline-light:hover{background:rgba(255,255,255,.12);}
  .btn.danger{background:var(--danger);color:#fff;}
  .btn.sm{padding:8px 14px;font-size:.8rem;min-height:36px;}
  .btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
  @media(max-width:640px){ .btn{min-height:44px;} .btn.sm{min-height:40px;} }

  /* ===== lessons: card grid with thumbnails ===== */
  .lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px;}
  .lesson-card2{
    background:var(--white);border:1px solid var(--line);border-radius:16px;overflow:hidden;
    display:flex;flex-direction:column;transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;box-shadow:var(--shadow-sm);
  }
  .lesson-card2:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--gold-light);}
  .lesson-thumb{
    position:relative;aspect-ratio:16/9;width:100%;background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 60%,var(--gold) 160%);
    display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.9);font-size:1.8rem;flex-shrink:0;
  }
  .lesson-thumb svg.subj-mark{width:34px;height:34px;opacity:.55;}
  .lesson-thumb .num-badge{
    position:absolute;top:8px;inset-inline-start:8px;background:rgba(14,31,43,.65);color:#fff;
    font-family:'Cairo';font-weight:700;font-size:.72rem;padding:3px 9px;border-radius:999px;
  }
  .lesson-thumb .play-badge{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s;
    background:rgba(14,31,43,.3);
  }
  .lesson-thumb .play-badge svg{width:30px;height:30px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4));}
  .lesson-card2:hover .play-badge{opacity:1;}
  .lesson-body{padding:10px 12px 12px;display:flex;flex-direction:column;gap:7px;flex:1;}
  .lesson-body .btn{width:100%;margin-top:auto;}
  .lesson-title2{font-weight:700;color:var(--navy);font-size:.92rem;line-height:1.4;}
  .lesson-meta-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:.75rem;}
  .lock-badge{display:inline-flex;align-items:center;gap:4px;font-size:.72rem;padding:4px 9px;border-radius:999px;font-weight:700;}
  .lock-badge svg{width:11px;height:11px;}
  .lock-badge.locked{background:#f3e3e3;color:var(--danger);}
  .lock-badge.open{background:#e2efe7;color:var(--ok);}
  .lesson-num{
    width:34px;height:34px;border-radius:50%;background:var(--paper-2);color:var(--navy);font-weight:700;
    display:flex;align-items:center;justify-content:center;font-family:'Cairo';flex-shrink:0;
  }

  /* ===== progress bar ===== */
  .progress-wrap{margin:6px 0 2px;}
  .progress-labels{display:flex;justify-content:space-between;font-size:.8rem;color:#5a6b76;margin-bottom:5px;}
  .progress-track{background:var(--paper-2);border-radius:999px;height:9px;overflow:hidden;}
  .progress-fill{
    height:100%;border-radius:999px;background:linear-gradient(90deg,var(--gold) 0%,var(--gold-light) 100%);
    width:0%;transition:width 1s cubic-bezier(.22,1,.36,1);
  }

  /* ===== dashboard summary cards ===== */

function buildContentFromRows(rows){
  const out = {};
  Object.keys(SUBJECT_META).forEach(sid=>{
    const meta = SUBJECT_META[sid];
    out[sid] = {
      id: meta.id, name: meta.name, teacher: meta.teacher, icon: meta.icon, desc: meta.desc,
      grades: meta.grades.map(g=>({id:g.id, name:g.name, lessons:[]}))
    };

  let matched = 0, skipped = 0;
  (rows||[]).forEach(row=>{
    const s = out[row.subject];
    if(!s){
      skipped++;
      console.warn(
        `[buildContentFromRows] تم تجاهل الدرس id=${row.id} title="${row.title}" لأن subject="${row.subject}" غير موجود في SUBJECT_META. القيم الصحيحة:`,
        Object.keys(SUBJECT_META)
      );

    const g = s.grades.find(x=>x.id===row.grade);

      skipped++;

        `[buildContentFromRows] تم تجاهل الدرس id=${row.id} title="${row.title}" لأن grade="${row.grade}" غير موجود ضمن صفوف subject="${row.subject}". القيم الصحيحة:`,
        s.grades.map(x=>x.id)
      );
      return;
    }
    matched++;
    g.lessons.push({
      id: row.id,
      title: row.title || "",
      description: row.description || "",

      exam_url: row.exam_url || "",

  return out;
}

/* ---------------- progress tracking (local, per-device — does not touch Supabase schema) ----------------
   نستخدم window.storage (localStorage) الموجود بالفعل لتخزين إعدادات الإدارة، لتسجيل الحصص التي
   شاهدها الطالب حتى النهاية، بدون أي تعديل على جداول Supabase. */
async function getCompletedLessons(email){
  if(!email) return [];
  try{
    const r = await window.storage.get("completed:"+email, false);
    const parsed = JSON.parse(r.value||"[]");
    return Array.isArray(parsed) ? parsed : [];
  }catch(e){ return []; }
}
async function markLessonCompleted(email, globalId){

    list.push(globalId);
    await window.storage.set("completed:"+email, JSON.stringify(list), false);
  }
  completedLessons = list;
}
/* آخر مرة شاهد فيها الطالب كل حصة — محلي فقط (localStorage)، لا يمس أي جدول Supabase.
   يُستخدم فقط لعرض "آخر مشاهدة" في بطاقات الصفوف. */
async function getLastWatchMap(email){
  if(!email) return {};
  try{
    const r = await window.storage.get("lastwatch:"+email, false);
    const parsed = JSON.parse(r.value||"{}");
    return (parsed && typeof parsed==="object" && !Array.isArray(parsed)) ? parsed : {};
  }catch(e){ return {}; }

/* يحوّل فارق زمني (Date.now() - ts) لعبارة عربية قصيرة زي "اليوم" / "منذ يومين" */
function timeAgoArabic(ts){
  if(!ts) return "";
  const diffMs = Date.now() - ts;
  const days = Math.floor(diffMs / 86400000);
  if(days<=0) return "اليوم";
  if(days===1) return "منذ يوم";
  if(days===2) return "منذ يومين";
  if(days<=10) return `منذ ${days} أيام`;
  const weeks = Math.floor(days/7);
  if(days<30) return weeks<=1? "منذ أسبوع" : `منذ ${weeks} أسابيع`;
  const months = Math.floor(days/30);
  return months<=1? "منذ شهر" : `منذ ${months} أشهر`;
}

/* ---------------- crypto helpers ---------------- */
async function hashText(text){
  const enc = new TextEncoder().encode(text);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

/* ---------------- storage shim (localStorage-backed replacement for window.storage) ---------------- */
window.storage = {
  async get(key, shared){
    if(!Object.prototype.hasOwnProperty.call(localStorage, key)){
      throw new Error("key not found: "+key);
    }
    return { key, value: localStorage.getItem(key), shared: !!shared };
  },
  async set(key, value, shared){
    localStorage.setItem(key, value);
    return { key, value, shared: !!shared };
  },
  async delete(key, shared){
    const existed = Object.prototype.hasOwnProperty.call(localStorage, key);
    localStorage.removeItem(key);
    return { key, deleted: existed, shared: !!shared };
  },
  async list(prefix, shared){
    const keys = [];
    for(let i=0;i<localStorage.length;i++){
      const k = localStorage.key(i);
      if(!prefix || k.indexOf(prefix)===0) keys.push(k);
    }
    return { keys, prefix, shared: !!shared };
  }
};

    console.error("[fetchLessonsDB] status:", status, statusText);
    console.error("[fetchLessonsDB] error.message:", error.message);
    console.error("[fetchLessonsDB] error.code:", error.code);
    console.error("[fetchLessonsDB] error.details:", error.details);
    console.error("[fetchLessonsDB] error.hint:", error.hint);
    // الخطأ الأكثر شيوعًا لهذه الحالة هو عدم وجود سياسة RLS تسمح بالقراءة (SELECT) لدور anon
    if(error.code === "42501" || /permission/i.test(error.message||"") || /row-level security/i.test(error.message||"")){
      console.error(
        "[fetchLessonsDB] هذا يبدو RLS يمنع القراءة. فعّل سياسة SELECT لدور anon على جدول lessons في Supabase، مثال:\n" +
        "  create policy \"lessons are readable by everyone\"\n" +
        "  on public.lessons for select\n" +
        "  to anon\n" +
        "  using (true);"
      );
    }
    return [];
  }

  lastFetchLessonsError = null;
  console.log(`[fetchLessonsDB] نجحت القراءة. عدد الصفوف المُستلمة: ${(data||[]).length}`);
  if(data && data.length){ console.log("[fetchLessonsDB] أول صف كمثال:", data[0]); }
  return data || [];
}

async function updateLessonDB(id, patch){
  // تحقق صارم من الـ id قبل إرسال أي طلب — لو ناقص هنا فده هو السبب الحقيقي
  // (مش .single() ولا RLS)، ولازم يبان في الـ Console فورًا بدل ما يوصل لخطأ PGRST116 غامض.
  if(id === undefined || id === null || String(id).trim() === ""){
    const err = new Error("updateLessonDB: id مفقود أو فارغ — لم يتم إرسال أي طلب لـ Supabase.");
    console.error("[updateLessonDB]", err.message, "id received:", id);
    throw err;
  }
  const cleanId = String(id).trim();

  console.log("Updating lesson id:", cleanId);
  console.log("Payload:", patch);

  // .update().select() بدون .single() يرجّع مصفوفة (0 أو أكثر من صف) بدل ما يفجّر
  // خطأ PGRST116/406 لو مفيش صف مطابق. ده هو الإصلاح الجذري لمشكلة .single().
  const {data, error, status, statusText} = await sb
    .from("lessons")
    .update(patch)
    .eq("id", cleanId)
    .select();

  if(error){
    console.error("[updateLessonDB] فشل الطلب. status:", status, statusText);
    console.error("[updateLessonDB] error.message:", error.message);
    console.error("[updateLessonDB] error.code:", error.code);
    console.error("[updateLessonDB] error.details:", error.details);
    console.error("[updateLessonDB] error.hint:", error.hint);
    throw error;
  }

  if(!data || data.length === 0){
    // هنا السبب الحقيقي: لا يوجد صف في جدول lessons بهذا الـ id (أو RLS UPDATE policy
    // بترجع 0 صفوف بدل خطأ صريح). رسالة واضحة بدل PGRST116 الغامض.
    const notFoundErr = new Error(
      `updateLessonDB: لم يتم العثور على أي صف في جدول lessons بالـ id = "${cleanId}". ` +
      `تأكد أن هذا id موجود فعليًا في الجدول، وأن نوع العمود id في Supabase يطابق شكل القيمة المُرسلة.`
    );
    console.error("[updateLessonDB]", notFoundErr.message);
    throw notFoundErr;
  }

  if(data.length > 1){
    // احتياطي: لو أكثر من صف اتحدّث بنفس الـ id (يعني الـ id مش unique) — لازم يظهر تحذير واضح
    console.warn(`[updateLessonDB] تحذير: تم تحديث ${data.length} صفوف بنفس الـ id="${cleanId}". تأكد أن عمود id فريد (UNIQUE/PK).`);
  }

  console.log("[updateLessonDB] نجح التحديث:", data[0]);
  return data[0];
}

/* setGrants: بدل الحذف الكامل وإعادة الإدخال (اللي بيمسح كل التاريخ ويعتمد على نجاح
   خطوتين منفصلتين)، بنعتمد على عمود active كمصدر وحيد للحقيقة:
   1) نطفي (active=false) كل اشتراكات الطالب.
   2) نعمل upsert للحصص المطلوبة فقط بـ active=true (يتطلب unique constraint على
      student_email+lesson_id — موجود في SQL المرفق تحت). */
async function setGrants(studentEmail, lessonIds){
  const desired = Array.from(new Set(lessonIds));
  try{
    const {error:offErr} = await sb
      .from("subscriptions")
      .update({active:false})
      .eq("student_email", studentEmail);
    if(offErr) throw offErr;

    if(desired.length>0){
      const rows = desired.map(lesson_id=>({student_email:studentEmail, lesson_id, active:true}));
      const {error:upErr} = await sb
        .from("subscriptions")
        .upsert(rows, {onConflict:"student_email,lesson_id"});
      if(upErr) throw upErr;
    }
    return {ok:true};
  }catch(e){
    console.error("setGrants failed:", e);
    return {ok:false, error:e};
  }
}

function embedUrl(link){
  if(!link) return "";
  try{
    const u = new URL(link);
    if(u.hostname.includes("youtube.com") || u.hostname.includes("youtu.be")){
      let id = u.searchParams.get("v");
      if(!id && u.hostname.includes("youtu.be")) id = u.pathname.slice(1);
      if(u.pathname.includes("/embed/")) return link+(link.includes("?")?"&":"?")+"enablejsapi=1";
      if(id) return "https://www.youtube.com/embed/"+id+"?enablejsapi=1";
    }
    if(u.hostname.includes("drive.google.com")){
      const m = link.match(/\/d\/([^/]+)/);
      if(m) return "https://drive.google.com/file/d/"+m[1]+"/preview";
    }
  }catch(e){}
  return link;
}

/* ================================================================
   مشغل الفيديو الاحترافي (Plyr + HLS.js)
   - يدعم: يوتيوب / فيميو / بث HLS (m3u8) مع اختيار الجودة تلقائياً
     من الميديا نفسها / فيديو مباشر (mp4,webm,ogg) / جودات متعددة
     عبر JSON / أي رابط آخر (Google Drive أو غيره) يبقى بنفس آلية
     iframe القديمة حفاظاً على التوافقية الكاملة.
   - لا يعيد تحميل الصفحة عند تغيير الجودة، ويحافظ على موضع
     المشاهدة عند إعادة الرسم (render) بفضل capturePlayerStateIfLesson.
   ================================================================ */
let plyrInstance = null;
let hlsInstance = null;
let currentPlayerKey = null;
let videoWatchdog = null;

function extractYouTubeId(link){
  try{
    const u = new URL(link);
    if(u.hostname.includes("youtu.be")) return u.pathname.slice(1).split("/")[0] || null;
    if(u.hostname.includes("youtube.com")){
      if(u.searchParams.get("v")) return u.searchParams.get("v");
      const m = u.pathname.match(/\/embed\/([^/?]+)/);
      if(m) return m[1];
    }
  }catch(e){}
  return null;
}
function extractVimeoId(link){
  try{
    const u = new URL(link);
    if(u.hostname.includes("vimeo.com")){
      const m = u.pathname.match(/(\d+)/);
      if(m) return m[1];
    }
  }catch(e){}
  return null;
}
function parseMultiQualitySources(link){
  const t = (link||"").trim();
  if(!t.startsWith("{")) return null;
  try{
    const obj = JSON.parse(t);
    const sizes = Object.keys(obj).map(k=>parseInt(k,10)).filter(n=>!isNaN(n)).sort((a,b)=>b-a);
    if(sizes.length===0) return null;
    return sizes.map(size=>({src:obj[String(size)], type:"video/mp4", size}));
  }catch(e){ return null; }
}
function isHlsLink(link){ return /\.m3u8(\?.*)?$/i.test((link||"").trim()); }
function isDirectVideoLink(link){ return /\.(mp4|webm|ogv|ogg)(\?.*)?$/i.test((link||"").trim()); }
function isDriveLink(link){ try{ return new URL(link).hostname.includes("drive.google.com"); }catch(e){ return false; } }
function guessMime(link){
  if(/\.webm(\?.*)?$/i.test(link)) return "video/webm";
  if(/\.(ogv|ogg)(\?.*)?$/i.test(link)) return "video/ogg";
  return "video/mp4";
}

function attachCommonPlyrEvents(restoreState){
  if(!plyrInstance) return;
  clearTimeout(videoWatchdog);
  let started = false;
  const applyRestore = ()=>{
    if(!restoreState) return;
    try{
      if(restoreState.time) plyrInstance.currentTime = restoreState.time;
      if(typeof restoreState.volume==="number") plyrInstance.volume = restoreState.volume;
      plyrInstance.muted = !!restoreState.muted;
      if(restoreState.speed) plyrInstance.speed = restoreState.speed;
      if(!restoreState.paused) plyrInstance.play().catch(()=>{});
    }catch(e){}
  };
  plyrInstance.on('ready', ()=>{ started=true; hideVideoError(); applyRestore(); });
  plyrInstance.on('loadeddata', ()=>{ started=true; hideVideoError(); });
  plyrInstance.on('playing', ()=>{
    started=true; hideVideoError();
    if(currentUser && route.name==="lesson"){
      const gid = subjLessonId(route.sid, route.gid, route.lid);
      markLessonWatched(currentUser.email, gid);
    }
  });
  plyrInstance.on('error', ()=>{ showVideoError(); });
  plyrInstance.on('ended', ()=>{
    if(currentUser && route.name==="lesson"){
      const gid = subjLessonId(route.sid, route.gid, route.lid);
      markLessonCompleted(currentUser.email, gid).then(()=>{
        if(route.name==="lesson") render();
      });
    }
  });
  videoWatchdog = setTimeout(()=>{
    if(!started) showVideoError("الفيديو يستغرق وقتاً أطول من المعتاد، تأكد من اتصالك بالإنترنت أو من صحة رابط الفيديو.");
  }, 15000);
}

function buildPlayer(link, key){
  const box = document.getElementById("videoPlayerBox");
  if(!box || !link) return;
  const restoreState = (arguments.length>2) ? arguments[2] : null;
  hideVideoError();
  currentPlayerKey = key;

  const multi = parseMultiQualitySources(link);
  const ytId = !multi ? extractYouTubeId(link) : null;
  const vimeoId = (!multi && !ytId) ? extractVimeoId(link) : null;
  const hls = (!multi && !ytId && !vimeoId) && isHlsLink(link);
  const drive = (!multi && !ytId && !vimeoId && !hls) && isDriveLink(link);
  const direct = (!multi && !ytId && !vimeoId && !hls && !drive) && isDirectVideoLink(link);

  /* أي رابط لا يمكن تشغيله عبر Plyr مباشرة (Google Drive أو غيره) يبقى بنفس أسلوب iframe الأصلي */
  if(drive || (!multi && !ytId && !vimeoId && !hls && !direct)){
    box.innerHTML = `<iframe id="playerFrame" src="${esc(embedUrl(link))}" allowfullscreen oncontextmenu="return false" style="width:100%;aspect-ratio:16/9;border:0;display:block;"></iframe>`;
    return;
  }

  if(ytId){
    box.innerHTML = `<div id="videoNativeEl" data-plyr-provider="youtube" data-plyr-embed-id="${esc(ytId)}"></div>`;
    plyrInstance = new Plyr("#videoNativeEl", Object.assign({}, basePlyrOptions(), {
      settings:['speed'], // يوتيوب لم يعد يسمح بفرض الجودة برمجياً بشكل موثوق، فنكتفي بعرض التحكم بالسرعة والصوت وملء الشاشة
      youtube:{ noCookie:false, rel:0, iv_load_policy:3, modestbranding:1 }
    }));
    attachCommonPlyrEvents(restoreState);
    return;
  }

  if(vimeoId){
    box.innerHTML = `<div id="videoNativeEl" data-plyr-provider="vimeo" data-plyr-embed-id="${esc(vimeoId)}"></div>`;
    plyrInstance = new Plyr("#videoNativeEl", Object.assign({}, basePlyrOptions(), { settings:['speed'] }));
    attachCommonPlyrEvents(restoreState);
    return;
  }

  box.innerHTML = `<video id="videoNativeEl" playsinline controls crossorigin></video>`;
  const videoEl = document.getElementById("videoNativeEl");

  if(multi){
    plyrInstance = new Plyr(videoEl, Object.assign({}, basePlyrOptions(), {
      quality: { default: multi[0].size, options: multi.map(m=>m.size), forced:true }
    }));
    plyrInstance.source = { type:'video', sources: multi };
    attachCommonPlyrEvents(restoreState);
    return;
  }

  if(hls){
    if(window.Hls && Hls.isSupported()){
      hlsInstance = new Hls({ capLevelToPlayerSize:true, maxBufferLength:30 });
      hlsInstance.loadSource(link);
      hlsInstance.attachMedia(videoEl);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, ()=>{
        const heights = Array.from(new Set(hlsInstance.levels.map(lv=>lv.height))).filter(Boolean).sort((a,b)=>b-a);
        const qualityCfg = heights.length>1 ? {
          default:0,
          options:[0, ...heights],
          forced:true,
          onChange:(newQuality)=>{
            if(!hlsInstance) return;
            if(newQuality===0){ hlsInstance.currentLevel = -1; }
            else{
              hlsInstance.levels.forEach((lv,idx)=>{ if(lv.height===newQuality) hlsInstance.currentLevel = idx; });
            }
          }
        } : undefined;
        plyrInstance = new Plyr(videoEl, Object.assign({}, basePlyrOptions(), {
          settings: qualityCfg ? ['quality','speed'] : ['speed'],
          quality: qualityCfg,
          i18n: Object.assign({}, PLYR_BASE_I18N, { qualityLabel:{0:"تلقائي"} })
        }));
        attachCommonPlyrEvents(restoreState);
      });
      hlsInstance.on(Hls.Events.ERROR, (evt,data)=>{
        if(!data || !data.fatal) return;
        if(data.type==="networkError"){ try{ hlsInstance.startLoad(); }catch(e){} }
        else if(data.type==="mediaError"){ try{ hlsInstance.recoverMediaError(); }catch(e){} }
        else{ showVideoError(); destroyPlayer(); }
      });
    } else if(videoEl.canPlayType("application/vnd.apple.mpegurl")){
      /* دعم HLS الأصلي داخل Safari على الآيفون/الماك */
      videoEl.src = link;
      plyrInstance = new Plyr(videoEl, Object.assign({}, basePlyrOptions(), { settings:['speed'] }));
      attachCommonPlyrEvents(restoreState);
    } else {
      showVideoError("هذا المتصفح لا يدعم تشغيل بث HLS، جرّب متصفحاً آخر.");
    }
    return;
  }

  /* فيديو مباشر بجودة واحدة (mp4 / webm / ogg) */
  plyrInstance = new Plyr(videoEl, Object.assign({}, basePlyrOptions(), { settings:['speed'] }));
  plyrInstance.source = { type:'video', sources:[{src:link, type:guessMime(link)}] };
  attachCommonPlyrEvents(restoreState);
}

function initLessonPlayerRoute(preState){
  const sid=route.sid, gid=route.gid, lid=route.lid;
  const s = content[sid]; const g = s && findGrade(sid,gid);
  console.log("[initLessonPlayerRoute] lessonId (route.lid):", lid, typeof lid);
  console.log("[initLessonPlayerRoute] lessons in this grade:", g && g.lessons.map(x=>({id:x.id, type:typeof x.id, title:x.title})));
  const l = g && g.lessons.find(x=>String(x.id)===String(lid));
  console.log("[initLessonPlayerRoute] matched lesson:", l);
  if(!l) return;
  const globalId = subjLessonId(sid,gid,lid);
  const unlocked = currentUser && grants.includes(globalId);
  if(!unlocked || !l.video_url){ destroyPlayer(); return; }
  const sameLesson = preState && preState.key===globalId;
  destroyPlayer();
  buildPlayer(l.video_url, globalId, sameLesson ? preState : null);
}

function retryVideo(){
  if(route.name!=="lesson") return;
  const g = findGrade(route.sid,route.gid);
  const l = g && g.lessons.find(x=>String(x.id)===String(route.lid));
  if(!l || !l.video_url) return;
  destroyPlayer();
  buildPlayer(l.video_url, subjLessonId(route.sid,route.gid,route.lid), null);
}

/* ---------------- event binding ---------------- */
function bindEvents(){
  document.querySelectorAll("[data-nav]").forEach(el=>{
    el.addEventListener("click", ()=>{
      route = JSON.parse(el.getAttribute("data-nav"));
      if(route.name==="admin"){ adminUnlocked = adminUnlocked; }
      render();
    });
  });
  const act = (sel,fn)=>document.querySelectorAll(sel).forEach(el=>el.addEventListener("click",fn));

  act('[data-action="open-auth"]', ()=>{ modal="auth"; authTab="login"; render(); });
  act('[data-action="retry-video"]', ()=>{ retryVideo(); });
  act('[data-action="open-pay"]', ()=>{
    if(!currentUser){ modal="auth"; authTab="login"; setToast({type:"err",text:"سجّل الدخول أولاً حتى يتم ربط الاشتراك بإيميلك."}); return; }
    modal="pay"; render();
  });
  act('[data-action="close-modal"]', ()=>{ modal=null; render(); });
  act('[data-action="close-modal-bg"]', (e)=>{ if(e.target.classList.contains("overlay")){ modal=null; render(); } });
  act('[data-action="open-legal"]', function(){ modal="legal"; legalTab=this.getAttribute("data-legal")||"privacy"; render(); });
  act('[data-action="legal-tab"]', function(){ legalTab=this.getAttribute("data-tab"); render(); });

  act('[data-action="auth-tab"]', function(){ authTab=this.getAttribute("data-tab"); render(); });
  act('[data-action="logout"]', async ()=>{
    await sb.auth.signOut();
    currentUser=null; grants=[]; completedLessons=[]; lastWatchMap={}; route={name:"home"}; render();
  });

  act('[data-action="do-login"]', async ()=>{
    const email = document.getElementById("authEmail").value.trim().toLowerCase();
    const pass = document.getElementById("authPass").value;
    if(!email||!pass){ setToast({type:"err",text:"من فضلك أدخل الإيميل وكلمة المرور."}); return; }
    const {data, error} = await sb.auth.signInWithPassword({email, password:pass});
    if(error){ setToast({type:"err",text:supabaseErrorToArabic(error)}); return; }
    currentUser = {id:data.user.id, email:data.user.email};
    await ensureStudentRow(currentUser.id, currentUser.email);
    grants = await getGrants(currentUser.email);
    completedLessons = await getCompletedLessons(currentUser.email);
    lastWatchMap = await getLastWatchMap(currentUser.email);
    modal=null;
    setToast({type:"ok",text:"تم تسجيل الدخول بنجاح."});
  });

  act('[data-action="do-register"]', async ()=>{
    const email = document.getElementById("authEmail").value.trim().toLowerCase();
    const pass = document.getElementById("authPass").value;
    if(!email.includes("@")||pass.length<6){ setToast({type:"err",text:"أدخل إيميل صحيح وكلمة مرور 6 أحرف على الأقل."}); return; }
    const {data, error} = await sb.auth.signUp({email, password:pass});
    if(error){ setToast({type:"err",text:supabaseErrorToArabic(error)}); return; }
    if(!data.session){
      /* email confirmation required by the Supabase project settings */
      modal=null;
      setToast({type:"ok",text:"تم إنشاء الحساب، برجاء تفعيل الإيميل من الرسالة المرسلة إليك ثم تسجيل الدخول."});
      return;
    }
    currentUser = {id:data.user.id, email:data.user.email};
    await ensureStudentRow(currentUser.id, currentUser.email);
    grants = [];
    completedLessons = [];
    lastWatchMap = {};
    modal=null;
    setToast({type:"ok",text:"تم إنشاء الحساب بنجاح."});
  });

  /* admin */
  act('[data-action="set-admin-pass"]', async ()=>{
    const p = document.getElementById("newAdminPass").value;
    if(p.length<4){ setToast({type:"err",text:"كلمة مرور قصيرة جداً."}); return; }
    await setAdminPass(await hashText(p));
    adminHasPassword=true; adminUnlocked=true;
    setToast({type:"ok",text:"تم تعيين كلمة مرور الإدارة."});
  });
  act('[data-action="admin-login"]', async ()=>{
    const p = document.getElementById("adminPassInput").value;
    if(p===ADMIN_FIXED_PASSWORD){ adminUnlocked=true; setToast({type:"ok",text:"مرحباً بك في لوحة التحكم."}); }
    else setToast({type:"err",text:"كلمة مرور خاطئة."});
  });
  act('[data-action="admin-logout"]', ()=>{ adminUnlocked=false; render(); });
  act('[data-action="admin-tab"]', function(){ adminTab=this.getAttribute("data-tab"); render(); });

  /* ---- lesson CRUD (Supabase "lessons" table) ---- */
  act('[data-action="new-lesson-form"]', function(){
    newLessonForm = {sid:this.dataset.sid, gid:this.dataset.gid};
    render();
  });
  act('[data-action="cancel-new-lesson"]', ()=>{ newLessonForm=null; render(); });

  act('[data-action="create-lesson"]', async function(){
    const sid=this.dataset.sid, gid=this.dataset.gid;
    const title = document.getElementById("newLessonTitle").value.trim();
    if(!title){ setToast({type:"err",text:"من فضلك أدخل عنوان الحصة."}); return; }
    const row = {
      title,
      description: document.getElementById("newLessonDesc").value.trim(),
      video_url: document.getElementById("newLessonVideo").value.trim(),
      exam_url: document.getElementById("newLessonExam").value.trim(),
      subject: sid,
      grade: gid
    };
    this.disabled = true; this.textContent = "جاري الإضافة...";
    try{
      await insertLessonDB(row);
      newLessonForm = null;
      await reloadContent();
      setToast({type:"ok",text:"تمت إضافة الحصة بنجاح، وهي ظاهرة الآن لكل المستخدمين."});
    }catch(e){
      console.error("insertLessonDB failed:", e);
      setToast({type:"err",text:"تعذّر إضافة الحصة، تأكد من صلاحيات Supabase (RLS) على جدول lessons."});
      render();
    }
  });

  act('[data-action="save-lesson"]', async function(){
    const lid = this.dataset.lid;
    if(!lid){
      console.error("[save-lesson] زر الحفظ ليس له data-lid — تعذّر معرفة أي درس يجب تحديثه.");
      setToast({type:"err",text:"خطأ داخلي: لم يتم العثور على معرّف الدرس (id) على الزر."});
      return;
    }
    const patch = {};
    document.querySelectorAll(`[data-field][data-lid="${CSS.escape(lid)}"]`).forEach(inp=>{
      patch[inp.dataset.field] = inp.value.trim();
    });
    if(!patch.title){ setToast({type:"err",text:"عنوان الحصة لا يمكن أن يكون فارغاً."}); return; }

    console.log("Updating lesson id:", lid);
    console.log("Payload:", patch);

    busyLessonId = lid; render();
    try{
      await updateLessonDB(lid, patch);
      busyLessonId = null;
      await reloadContent();
      setToast({type:"ok",text:"تم حفظ تعديلات الحصة بنجاح، وستظهر لكل المستخدمين بعد تحديث الصفحة."});
    }catch(e){
      console.error("updateLessonDB failed:", e);
      busyLessonId = null;
      // نعرض رسالة الخطأ الفعلية بدل تخمين RLS دائمًا — لأن السبب هنا قد يكون id غير مطابق
      setToast({type:"err",text:"تعذّر حفظ التعديلات: " + (e && e.message ? e.message : "خطأ غير معروف") + " — افتح Console للتفاصيل."});
      render();
    }
  });

  act('[data-action="del-lesson"]', async function(){
    const lid = this.dataset.lid;
    if(!confirm("هل أنت متأكد من حذف هذه الحصة؟ لا يمكن التراجع عن هذا الإجراء.")) return;
    busyLessonId = lid; render();
    try{
      await deleteLessonDB(lid);
      busyLessonId = null;
      await reloadContent();
      setToast({type:"ok",text:"تم حذف الحصة، واختفت الآن من جميع المستخدمين."});
    }catch(e){
      console.error("deleteLessonDB failed:", e);
      busyLessonId = null;
      setToast({type:"err",text:"تعذّر حذف الحصة، تأكد من صلاحيات Supabase (RLS) على جدول lessons."});
      render();
    }
  });

  act('[data-action="load-grant-email"]', async ()=>{
    const email = document.getElementById("grantEmail").value.trim().toLowerCase();
    if(!email){ return; }
    const area = document.getElementById("grantArea");
    area.innerHTML = `<div class="msg ok">جاري البحث...</div>`;
    const u = await getUser(email);
    if(!u){ area.innerHTML = `<div class="msg err">لا يوجد حساب بهذا الإيميل بعد. اطلب من الطالب إنشاء حساب أولاً.</div>`; return; }
    const currentGrants = await getGrants(u.email);
    window.__grantDraft = new Set(currentGrants);
    area.innerHTML = renderGrantEditor(u, currentGrants);
    bindGrantEditor(u.email);
  });

  act('[data-action="admin-tab"]', function(){});

  /* ---- instant lesson search (home page) ----
     نحدّث نتائج البحث بتعديل مباشر للـ DOM بدل استدعاء render() الكامل، حتى لا يفقد
     حقل البحث تركيز الكتابة (focus) مع كل حرف يكتبه المستخدم. */
  const searchInput = document.getElementById("lessonSearchInput");
  if(searchInput){
    searchInput.addEventListener("input", function(){
      searchQuery = this.value;
      renderSearchResults();
    });
    renderSearchResults();
  }
}

function renderSearchResults(){
  const box = document.getElementById("searchResultsBox");
  if(!box || !content) return;
  const q = searchQuery.trim().toLowerCase();
  if(!q){ box.innerHTML = ""; return; }
  const results = [];
  Object.keys(content).forEach(sid=>{
    const s = content[sid];
    s.grades.forEach(g=>{
      g.lessons.forEach(l=>{
        const haystack = (l.title+" "+s.name+" "+g.name).toLowerCase();
        if(haystack.includes(q)) results.push({sid, gid:g.id, lid:l.id, title:l.title, subj:s.name, grade:g.name});
      });
    });
  });
  if(results.length===0){
    box.innerHTML = `<div class="empty" style="padding:20px;">لا توجد نتائج مطابقة لـ "${esc(searchQuery)}"</div>`;
    return;
  }
  box.innerHTML = results.slice(0,20).map(r=>`
    <div class="search-result-item" data-nav='{"name":"lesson","sid":"${r.sid}","gid":"${r.gid}","lid":"${r.lid}"}'>
      <div><div class="srt">${esc(r.title)}</div><div class="srm">${esc(r.subj)} · ${esc(r.grade)}</div></div>
      <span>←</span>
    </div>`).join("");
  box.querySelectorAll("[data-nav]").forEach(el=>{
    el.addEventListener("click", ()=>{
      route = JSON.parse(el.getAttribute("data-nav"));
      render();
    });
  });
}

function renderGrantEditor(student, currentGrants){
  const email = student.email;
  let html = `<div class="msg ok">حساب موجود: ${esc(email)} — الحصص المفتوحة حالياً: ${currentGrants.length}</div>`;
  html += `<div class="warn-box" style="margin:10px 0;">حدد الحصص المطلوب فتحها (بحد أقصى ${MONTH_LESSONS} حصة للاشتراك الشهري).</div>`;
  ["math","acc"].forEach(sid=>{
    const s = content[sid];
    html += `<h4 style="color:var(--gold);margin-top:14px;">${s.icon} ${esc(s.name)}</h4>`;
    s.grades.forEach(g=>{
      if(g.lessons.length===0) return;
      html += `<div style="margin-bottom:8px;"><b style="font-size:.85rem">${esc(g.name)}</b><div class="chk-grid">`;
      g.lessons.forEach(l=>{
        const gid = subjLessonId(sid,g.id,l.id);
        const checked = currentGrants.includes(gid);
        html += `<label class="chk-item"><input type="checkbox" data-grantid="${gid}" ${checked?'checked':''}> ${esc(l.title)}</label>`;
      });
      html += `</div></div>`;
    });
  });
  html += `<div id="grantCountWarn" class="msg err" style="display:none;">لا يمكن اختيار أكثر من ${MONTH_LESSONS} حصص ضمن الاشتراك الشهري.</div>`;
  html += `<button class="btn gold" data-action="save-grants" data-studentemail="${esc(student.email)}">💾 حفظ الاشتراك لهذا الطالب</button>`;
  return html;
}

function bindGrantEditor(email){
  document.querySelectorAll('[data-grantid]').forEach(cb=>{
    cb.addEventListener("change", function(){
      const id = this.dataset.grantid;
      if(this.checked) window.__grantDraft.add(id); else window.__grantDraft.delete(id);
      const warn = document.getElementById("grantCountWarn");
      warn.style.display = window.__grantDraft.size > MONTH_LESSONS ? "block" : "none";
    });
  });
  document.querySelector('[data-action="save-grants"]').addEventListener("click", async function(){
    const btn = this;
    const list = Array.from(window.__grantDraft);
    btn.disabled = true; btn.textContent = "جاري الحفظ...";
    const result = await setGrants(email, list);
    btn.disabled = false; btn.textContent = "💾 حفظ الاشتراك لهذا الطالب";
    if(result.ok){
      setToast({type:"ok",text:"تم تحديث اشتراك الطالب "+email+" — عدد الحصص المفتوحة: "+list.length});
    }else{
      setToast({type:"err",text:"تعذّر حفظ الاشتراك، تأكد من صلاحيات Supabase (RLS) على جدول subscriptions."});
    }
  });
}

/* ---------------- best-effort recording deterrents ---------------- */
/* ملاحظة: لا توجد وسيلة برمجية داخل المتصفح تكتشف تسجيل الشاشة بشكل مضمون 100%،
   خصوصاً لو حد صوّر الشاشة بموبايل تاني من بره. اللي تحت ده إجراءات رادعة قدر الإمكان فقط. */
function toggleRecOverlay(show){
  const ov = document.getElementById("recOverlay");
  if(!ov) return;
  ov.style.display = show ? "flex" : "none";
}
function pauseVideoFrame(){
  try{ if(plyrInstance && typeof plyrInstance.pause==="function") plyrInstance.pause(); }catch(e){}
  const f = document.getElementById("playerFrame");
  if(f && f.src && f.src.includes("youtube.com")){
    try{ f.contentWindow.postMessage(JSON.stringify({event:"command",func:"pauseVideo",args:[]}), "*"); }catch(e){}
  }
}
function flashRecOverlay(){
  toggleRecOverlay(true);
  setTimeout(()=>{ if(!document.hidden) toggleRecOverlay(false); }, 1500);
}

/* حالة ملء الشاشة: لا نخفي الفيديو أبداً أثناءها */
let isFsActive = false;
function updateFsFlag(){
  isFsActive = !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement);
}
["fullscreenchange","webkitfullscreenchange","mozfullscreenchange","MSFullscreenChange"].forEach(evt=>{
  document.addEventListener(evt, updateFsFlag);
});

/* حالة تدوير الشاشة: نتجاهل الإخفاء لثوانٍ قليلة أثناء وبعد التدوير مباشرة */
let isRotating = false;
let rotateTimer = null;
function markRotating(){
  isRotating = true;
  clearTimeout(rotateTimer);
  rotateTimer = setTimeout(()=>{ isRotating = false; }, 1200);
}
window.addEventListener("orientationchange", markRotating);
if(window.screen && window.screen.orientation && window.screen.orientation.addEventListener){
  window.screen.orientation.addEventListener("change", markRotating);
}

/* الاعتماد فقط على visibilitychange (وليس blur) مع مهلة 5 ثوانٍ قبل الإخفاء الفعلي،
   بحيث لا يتأثر الفيديو بفتح لوحة الصوت أو إشعار عابر أو تبديل سريع بين النوافذ */
let hideTimer = null;
document.addEventListener("visibilitychange", ()=>{
  if(document.hidden){
    if(isFsActive || isRotating) return;
    clearTimeout(hideTimer);
    hideTimer = setTimeout(()=>{
      if(document.hidden && !isFsActive && !isRotating){
        toggleRecOverlay(true);
        pauseVideoFrame();
      }
    }, 5000);
  } else {
    clearTimeout(hideTimer);
    toggleRecOverlay(false);
  }
});
window.addEventListener("focus", ()=>{ clearTimeout(hideTimer); toggleRecOverlay(false); });
window.addEventListener("keyup", (e)=>{ if(e.key==="PrintScreen"){ flashRecOverlay(); } });
window.addEventListener("keydown", (e)=>{
  if((e.metaKey||e.ctrlKey) && e.shiftKey && ["s","S","4","3"].includes(e.key)){ flashRecOverlay(); }
});

/* ---------------- init ---------------- */
async function init(){
  await loadContent();
  adminHasPassword = true; // كلمة المرور ثابتة (1792006) ولا تحتاج تعيين لأول مرة

  const {data:{session}} = await sb.auth.getSession();
  if(session && session.user){
    currentUser = {id:session.user.id, email:session.user.email};
    await ensureStudentRow(currentUser.id, currentUser.email);
    grants = await getGrants(currentUser.email);
    completedLessons = await getCompletedLessons(currentUser.email);
    lastWatchMap = await getLastWatchMap(currentUser.email);
  }

  sb.auth.onAuthStateChange((event, session)=>{
    if(event==="SIGNED_OUT"){
      currentUser = null; grants = []; completedLessons = []; lastWatchMap = {};
      render();
    }
  });

  render();
}
init();

/* ------------------------------------------------------------
   واجهة تصحيح فقط (Debug) — عشان تقدر تختبر الدوال من console
   المتصفح مباشرة. الدوال الأصلية فضلت جوه الـ IIFE زي ما هي
   (encapsulation سليم)؛ دي مجرد مرايا بتشاور عليها من الخارج.
   مثال استخدام من الـ console:
     await window.VirexonDebug.getGrants("student@example.com")
     await window.VirexonDebug.setGrants("student@example.com", ["math__g4__l1"])
     window.VirexonDebug.getCurrentUser()
   ------------------------------------------------------------ */
window.VirexonDebug = {
  getGrants,
  setGrants,
  getUser,
  ensureStudentRow,
  getCurrentUser: ()=>currentUser,
  getCurrentGrants: ()=>grants,
  reloadAndRender: async ()=>{ await reloadContent(); render(); },
  sb
};

/* ------------------------------------------------------------
   دالة saveLesson عامة (Global) — يمكن نداؤها مباشرة من الـ
   console أو من أي كود خارج الـ IIFE، وتستخدم نفس عميل Supabase
   ونفس منطق إدراج الصف المستخدم في زر "💾 إضافة الحصة" بالضبط،
   حتى لا يتكرر منطق الحفظ في مكانين مختلفين.

   الاستخدام من الـ console:
     await window.saveLesson({
       title: "عنوان الحصة",
       description: "وصف مختصر",
       video_url: "https://...",
       exam_url: "https://...",
       subject: "math",   // لازم يطابق مفتاح موجود في SUBJECT_META
       grade: "g4"        // لازم يطابق id صف موجود داخل هذه المادة
     });
------------------------------------------------------------- */
window.saveLesson = async function saveLesson(lessonData){
  lessonData = lessonData || {};
  const row = {
    title: (lessonData.title || "").trim(),
    description: (lessonData.description || "").trim(),
    video_url: (lessonData.video_url || "").trim(),
    exam_url: (lessonData.exam_url || "").trim(),
    subject: lessonData.subject,
    grade: lessonData.grade
  };
  if(!row.title){ throw new Error("عنوان الحصة (title) مطلوب."); }
  if(!row.subject || !row.grade){ throw new Error("subject و grade مطلوبان."); }

  const { data, error } = await sb
    .from('lessons')
    .insert([row])
    .select();

  if(error){
    console.error("saveLesson failed:", error);
    throw error;
  }
  console.log("saveLesson succeeded:", data);

  // حدّث المحتوى المعروض في الواجهة فوراً بنفس بيانات الجدول
  await window.VirexonDebug.reloadAndRender();
  return data;
};

})();
